<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Angular Inspector Panel</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: #f8fafc;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }

      button {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 6px 10px;
        background: #ffffff;
        cursor: pointer;
      }

      #status {
        font-size: 12px;
        color: #334155;
      }

      pre {
        margin: 0;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        border-radius: 8px;
        padding: 10px;
        font-size: 12px;
        overflow: auto;
        max-height: calc(100vh - 90px);
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button id="refreshBtn" type="button">Refresh Report</button>
      <span id="status">Waiting for scan...</span>
    </div>
    <pre id="reportOutput">No report available yet.</pre>
    <script src="devtools-panel.js"></script>
  </body>
</html>
