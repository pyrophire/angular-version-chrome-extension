name: Build and Release Extension

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

jobs:
  detect-version-change:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version_check.outputs.should_release }}
      version: ${{ steps.version_check.outputs.version }}
      tag: ${{ steps.version_check.outputs.tag }}

    steps:
      - name: Check whether package version changed
        id: version_check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const packageChanged = files.some((file) => file.filename === 'package.json');
            if (!packageChanged) {
              core.info('package.json was not changed in this PR.');
              core.setOutput('should_release', 'false');
              return;
            }

            const readVersion = async (ref) => {
              const response = await github.rest.repos.getContent({
                owner,
                repo,
                path: 'package.json',
                ref,
              });

              if (Array.isArray(response.data) || !('content' in response.data)) {
                throw new Error(`Unexpected content response for ref ${ref}`);
              }

              const json = Buffer.from(response.data.content, 'base64').toString('utf8');
              return JSON.parse(json).version;
            };

            const baseVersion = await readVersion(pr.base.sha);
            const mergedRef = pr.merge_commit_sha || pr.head.sha;
            const mergedVersion = await readVersion(mergedRef);

            core.info(`Base version: ${baseVersion}; merged version: ${mergedVersion}`);

            if (baseVersion === mergedVersion) {
              core.setOutput('should_release', 'false');
              return;
            }

            core.setOutput('should_release', 'true');
            core.setOutput('version', mergedVersion);
            core.setOutput('tag', `v${mergedVersion}`);

  release:
    needs: detect-version-change
    if: ${{ needs.detect-version-change.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build zip artifact
        run: npm run build

      - name: Create tag and GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.detect-version-change.outputs.tag }}
          name: Release ${{ needs.detect-version-change.outputs.tag }}
          commit: ${{ github.event.pull_request.merge_commit_sha }}
          artifacts: dist/phire-angular-version-extension.zip
          artifactContentType: application/zip
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
          body: |
            ## Install Locally in Chrome
            1. Download the release asset: `phire-angular-version-extension.zip`.
            2. Unzip it to a local folder.
            3. Open Chrome and go to `chrome://extensions/`.
            4. Enable **Developer mode** (top-right).
            5. Click **Load unpacked**.
            6. Select the unzipped folder.

            ## Notes
            - This release is generated from PR #${{ github.event.pull_request.number }} merged into `main`.
            - Version: `${{ needs.detect-version-change.outputs.version }}`
            - Commit: `${{ github.event.pull_request.merge_commit_sha }}`
